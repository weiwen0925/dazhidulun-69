color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;
text-align:center;line-height:1.5;background:linear-gradient(to bottom,var(--sbBg) 80%,rgba(30,26,20,0));
padding:14px 4px 12px;margin-bottom:6px;z-index:5;text-decoration:none;cursor:pointer;
transition:color .25s;display:block;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .l1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;color:var(--gold);}
.sb-brand .l2{display:block;font-size:14px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .l3{display:block;font-size:10px;opacity:.55;margin-top:3px;color:var(--gold);}
.sb-nav{display:flex;flex-direction:column;gap:8px;width:100%;align-items:center;margin-top:8px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;
padding:7px 4px;cursor:pointer;transition:background .2s;border-radius:8px;}
.sb-item:hover{background:rgba(184,134,11,.12);}
.sb-circle{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--gold);
display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;
font-size:16px;font-weight:600;color:var(--goldL);transition:all .25s;}
.sb-label{font-size:11.5px;letter-spacing:.3px;color:var(--sbText);opacity:.85;
font-family:"Noto Sans TC",sans-serif;text-align:center;line-height:1.3;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);
box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);opacity:1;font-weight:500;}

/* ── 進度膠囊 ── */

font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;

backdrop-filter:blur(6px);transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ── 主區 ── */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#f7f3ec;text-align:center;
padding:74px 24px 60px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
font-size:280px;font-weight:900;color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;z-index:0;}
.site-hero>*{position:relative;z-index:1;}
.hero-tag{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:8px;color:var(--goldL);margin-bottom:18px;}
.hero-title{font-size:64px;font-weight:900;letter-spacing:14px;color:#f0e6c8;margin:0 0 18px;text-shadow:0 2px 18px rgba(0,0,0,.35);}
.hero-subtitle{font-size:20px;color:#e8dcc0;letter-spacing:2px;margin-bottom:14px;}
.hero-range{font-family:"Noto Sans TC",sans-serif;font-size:16px;color:var(--goldL);letter-spacing:1px;
margin:18px auto 0;max-width:680px;padding-top:16px;border-top:1px solid rgba(184,134,11,.3);}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:15px;color:#cbbd9e;letter-spacing:1px;margin-top:14px;}
.hero-en{font-family:Georgia,serif;font-style:italic;font-size:15px;color:#b8a980;margin-top:10px;letter-spacing:.5px;}

/* ── 前言 ── */
.preface{max-width:880px;margin:48px auto 8px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;font-weight:700;color:var(--accent);letter-spacing:8px;margin-bottom:8px;}
.preface-deco{width:64px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-align:justify;}
.preface strong{color:var(--accent-red);font-weight:700;}

/* ── 總目錄 ── */
.toc-section{max-width:1100px;margin:40px auto 30px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:10px;margin-bottom:8px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--text-muted);letter-spacing:1px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 26px;

.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex-shrink:0;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldL));

box-shadow:0 2px 8px rgba(184,134,11,.35);}
.toc-body{flex:1;}
.toc-name{font-size:21px;font-weight:700;color:var(--accent);line-height:1.5;margin-bottom:6px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:14.5px;color:var(--text-muted);line-height:1.6;}
.toc-tag{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12px;color:var(--gold);
border:1px solid var(--gold);border-radius:10px;padding:1px 10px;margin-top:10px;letter-spacing:1px;}

/* ── 章節 / 橋接 ── */
.chapter{margin:56px 0 0;scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#f7f3ec;text-align:center;padding:46px 24px 40px;position:relative;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:6px;color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:38px;font-weight:900;letter-spacing:4px;color:#f0e6c8;margin:0 0 16px;text-shadow:0 2px 14px rgba(0,0,0,.3);}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;color:#d8cba8;letter-spacing:1px;max-width:720px;margin:0 auto;line-height:1.7;}
.ch-head::after{content:"";display:block;width:80px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:22px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:34px 28px 10px;}
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);

.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;background:var(--gold);color:#fff;
padding:3px 14px;border-radius:12px;letter-spacing:2.2px;margin-bottom:12px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}
.bridge strong{color:var(--accent-red);font-weight:700;}
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);border-radius:12px;
box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:200px;}

/* ── 頁尾 ── */
.site-footer{background:var(--headGrad);color:#cbbd9e;text-align:center;padding:40px 24px;margin-top:60px;
font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:1px;line-height:1.8;}
.site-footer .ft-deco{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 18px;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;width:44px;height:44px;border-radius:10px;

#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;background:var(--gold);color:#fff;
border:0;font-size:20px;cursor:pointer;display:none;z-index:120;box-shadow:0 3px 12px rgba(0,0,0,.25);}
#backTop.show{display:block;}

@media(max-width:900px){
 #sb{transform:translateX(-100%);transition:transform .3s;}

 .ch-body{padding:24px 16px 8px;}
 .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){.hero-title{font-size:36px;}.preface,.toc-section{padding:0 16px;}}

 if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
 var id=h.substring(1);var el=document.getElementById(id);if(!el)return;e.preventDefault();
 resizeAllFrames();setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
 var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});
 var sbEl=document.getElementById('sb');if(sbEl)sbEl.classList.remove('open');},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
/* 側欄高亮 */
var chs=[].slice.call(document.querySelectorAll('.chapter'));
var items=[].slice.call(document.querySelectorAll('.sb-item'));
function highlight(){var idx=-1;for(var i=0;i<chs.length;i++){if(chs[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;}
 items.forEach(function(it,i){it.classList.toggle('active',i===idx);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
/* 回頂 / 漢堡 */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){if(backTop)backTop.classList.toggle('show',window.scrollY>600);},{passive:true});
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var sbBrand=document.getElementById('sbBrand');if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
var sbToggle=document.getElementById('sbToggle'),sbEl=document.getElementById('sb');
if(sbToggle)sbToggle.addEventListener('click',function(){sbEl.classList.toggle('open');});
/* 進度膠囊接近頁尾淡出 */
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
 function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
 var f=document.querySelector('.site-footer');if(!f)return;
 if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(f);}
 else{window.addEventListener('scroll',function(){setHide(document.documentElement.scrollHeight-(window.scrollY+window.innerHeight)<240);},{passive:true});}})();
/* 外層防複製 */
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
 if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U')){blk(e);}
 if(k==='F12')blk(e);if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}},true);})();
</script>
<script id="wy-deeplink">
(function(){
  function wyGoto(hash){
    if(!hash)return;
    var m=String(hash).replace(/^#/,'');
    var pm=m.match(/^chapter-(\d+)-(\d+)-(\d+)$/);
    if(!pm)return;
    var sec=document.getElementById('chapter-'+pm[1]);
    if(!sec)return;
    var fr=sec.querySelector('iframe.ch-frame');
    if(!fr){var r=sec.getBoundingClientRect();window.scrollTo({top:window.scrollY+r.top-10,behavior:'smooth'});return;}
    (function tryScroll(n){
      try{
        var d=fr.contentDocument||(fr.contentWindow&&fr.contentWindow.document);
        var el=d&&d.getElementById(m);
        if(el){
          if(typeof window.resizeAllFrames==='function'){try{window.resizeAllFrames();}catch(e){}}
          var frRect=fr.getBoundingClientRect();
          var elRect=el.getBoundingClientRect();
          var y=window.scrollY+frRect.top+elRect.top-28;
          window.scrollTo({top:y,behavior:'smooth'});
          setTimeout(function(){try{el.style.transition='background .4s';var o=el.style.background;
            el.style.background='rgba(184,134,11,.18)';setTimeout(function(){el.style.background=o;},1200);}catch(e){}},420);
          return;
        }
      }catch(e){}
      if(n<48)setTimeout(function(){tryScroll(n+1);},250);
    })(0);
  }
  window.wyGoto=wyGoto;
  window.addEventListener('hashchange',function(){wyGoto(location.hash);});
  function initial(){if(location.hash)setTimeout(function(){wyGoto(location.hash);},700);}
  if(window.__wyReady&&window.__wyReady.then){window.__wyReady.then(function(){initial();});}
  else{window.addEventListener('load',initial);}
})();
</script>
<script id="wy-video">
(function(){
  var V={1:{name:"釋兩不和合品第四十七之餘",url:"https://youtu.be/bbLR4tTqWjw"},
         2:{name:"兩不和合品",url:"https://youtu.be/vDODkJm4C0c"},
         3:{name:"釋佛母品第四十八",url:"https://youtu.be/0scmsOEiXgg"}};
  /* 總目錄字卡「影音」膠囊：攔截卡片導覽、開影片 */
  document.addEventListener('click',function(e){
    var v=e.target&&e.target.closest?e.target.closest('.toc-video'):null;
    if(!v)return;e.preventDefault();e.stopPropagation();
    var u=v.getAttribute('data-url');if(u)window.open(u,'_blank','noopener');
  },true);
  /* 主頁浮動鈕：隨閱讀中的品自動切換連結與品名 */
  var fab=document.createElement('a');fab.className='wy-vfab';fab.target='_blank';fab.rel='noopener';
  fab.setAttribute('aria-label','觀看本品影音');
  fab.innerHTML='<span class="wy-vfab-ic">\u25B6</span><span class="wy-vfab-tx">'+
    '<span class="wy-vfab-t1">\u672c\u54c1\u5f71\u97f3</span>'+
    '<span class="wy-vfab-t2"></span></span>';
  var t2=fab.querySelector('.wy-vfab-t2');
  function attach(){if(document.body&&!fab.parentNode)document.body.appendChild(fab);}
  attach();
  var chs=[].slice.call(document.querySelectorAll('.chapter'));
  function activeIdx(){var idx=-1;for(var i=0;i<chs.length;i++){
    if(chs[i].getBoundingClientRect().top<window.innerHeight*0.4)idx=i;}return idx;}
  function update(){attach();var n=activeIdx()+1;var v=V[n];
    if(v){fab.href=v.url;if(t2.textContent!==v.name)t2.textContent=v.name;fab.classList.add('show');}
    else{fab.classList.remove('show');}}
  window.addEventListener('scroll',update,{passive:true});
  window.addEventListener('resize',update,{passive:true});
  if(window.__wyReady&&window.__wyReady.then){window.__wyReady.then(function(){setTimeout(update,200);});}
  window.addEventListener('load',update);setTimeout(update,400);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-69-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
